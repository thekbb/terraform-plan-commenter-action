name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 4 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce64ddcdf5a4be6325435fba6da1bb1adeecc6e3 # v3.35.2
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@ce64ddcdf5a4be6325435fba6da1bb1adeecc6e3 # v3.35.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ce64ddcdf5a4be6325435fba6da1bb1adeecc6e3 # v3.35.2
