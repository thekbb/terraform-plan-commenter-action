name: End-to-End Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  smoke-test:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare unique fixture directory
        id: fixture
        shell: bash
        run: |
          fixture_dir="fixtures/e2e/runtime-smoke"
          rm -rf "$fixture_dir"
          cp -R fixtures/e2e/basic-plan "$fixture_dir"
          echo "fixture_dir=$fixture_dir" >> "$GITHUB_OUTPUT"

      - name: Run action once
        id: first
        uses: ./
        env:
          COMMENT_NOTE: |
            Automated end-to-end smoke test. This verifies the normal successful plan path and comment update behavior.
            Expected to persist on the pull request and be updated by later runs of this same test.
        with:
          working-directory: ${{ steps.fixture.outputs.fixture_dir }}
          terraform-version: '1.14.3'
          github-token: ${{ github.token }}

      - name: Assert first action outputs
        shell: bash
        env:
          PLAN_EXIT_CODE: ${{ steps.first.outputs.plan-exit-code }}
          HAS_CHANGES: ${{ steps.first.outputs.has-changes }}
        run: |
          test "$PLAN_EXIT_CODE" = "2"
          test "$HAS_CHANGES" = "true"

      - name: Run action twice to exercise comment update
        if: github.event_name == 'pull_request'
        id: second
        uses: ./
        env:
          COMMENT_NOTE: |
            Automated end-to-end smoke test. This verifies the normal successful plan path and comment update behavior.
            Expected to persist on the pull request and be updated by later runs of this same test.
        with:
          working-directory: ${{ steps.fixture.outputs.fixture_dir }}
          terraform-version: '1.14.3'
          github-token: ${{ github.token }}

      - name: Assert second action outputs
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          PLAN_EXIT_CODE: ${{ steps.second.outputs.plan-exit-code }}
          HAS_CHANGES: ${{ steps.second.outputs.has-changes }}
        run: |
          test "$PLAN_EXIT_CODE" = "2"
          test "$HAS_CHANGES" = "true"

      - name: Assert exactly one PR comment exists for this fixture
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          FIXTURE_DIR: ${{ steps.fixture.outputs.fixture_dir }}
        with:
          github-token: ${{ github.token }}
          script: |
            const markerDir = process.env.FIXTURE_DIR === '.'
              ? 'root'
              : process.env.FIXTURE_DIR.replaceAll('/', '-');
            const marker = `<!-- terraform-plan-comment:${markerDir}:default -->`;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              }
            );

            const matches = comments.filter((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (matches.length !== 1) {
              throw new Error(`expected exactly one bot comment with marker ${marker}, found ${matches.length}`);
            }

            const body = matches[0].body;
            if (!body.includes('### Terraform Plan')) {
              throw new Error('expected the smoke-test comment to include the Terraform Plan heading');
            }

            if (!body.includes('Automated end-to-end smoke test. This verifies the normal successful plan path and comment update behavior.')) {
              throw new Error('expected the smoke-test comment to identify itself as an automated test artifact');
            }

            if (!body.includes('Plan: 1 to add, 0 to change, 0 to destroy.')) {
              throw new Error('expected the smoke-test comment to include the planned resource addition');
            }

  large-plan-truncation:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate a large Terraform fixture
        id: fixture
        shell: bash
        run: |
          fixture_dir="fixtures/e2e/runtime-large-plan"
          rm -rf "$fixture_dir"
          mkdir -p "$fixture_dir"

          cat > "$fixture_dir/main.tf" <<'EOF'
          terraform {
            required_version = ">= 1.4.0"
          }
          EOF

          for i in $(seq 1 1500); do
            cat >> "$fixture_dir/main.tf" <<EOF

          resource "terraform_data" "example_${i}" {
            input = "terraform-plan-commenter-action-${i}"
          }
          EOF
          done

          echo "fixture_dir=$fixture_dir" >> "$GITHUB_OUTPUT"

      - name: Run action against the large fixture
        id: plan
        uses: ./
        env:
          COMMENT_NOTE: |
            Automated end-to-end large-plan truncation test. This verifies the oversized comment fallback and workflow-run link.
            Expected to persist on the pull request and be updated by later runs of this same test.
        with:
          working-directory: ${{ steps.fixture.outputs.fixture_dir }}
          terraform-version: '1.14.3'
          github-token: ${{ github.token }}

      - name: Assert action outputs
        shell: bash
        env:
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.plan-exit-code }}
          HAS_CHANGES: ${{ steps.plan.outputs.has-changes }}
        run: |
          test "$PLAN_EXIT_CODE" = "2"
          test "$HAS_CHANGES" = "true"

      - name: Assert the PR comment took the truncation path
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          FIXTURE_DIR: ${{ steps.fixture.outputs.fixture_dir }}
        with:
          github-token: ${{ github.token }}
          script: |
            const markerDir = process.env.FIXTURE_DIR === '.'
              ? 'root'
              : process.env.FIXTURE_DIR.replaceAll('/', '-');
            const marker = `<!-- terraform-plan-comment:${markerDir}:default -->`;
            const expectedRunUrl =
              `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              }
            );

            const matches = comments.filter((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (matches.length !== 1) {
              throw new Error(`expected exactly one bot comment with marker ${marker}, found ${matches.length}`);
            }

            const body = matches[0].body;
            if (!body.includes('Plan output is too large for GitHub comment')) {
              throw new Error('expected the large-plan comment to include the truncation warning');
            }

            if (!body.includes('Automated end-to-end large-plan truncation test. This verifies the oversized comment fallback and workflow-run link.')) {
              throw new Error('expected the large-plan comment to identify itself as an automated test artifact');
            }

            if (!body.includes(expectedRunUrl)) {
              throw new Error(`expected the large-plan comment to link to ${expectedRunUrl}`);
            }

            if (!body.includes('🟢 <strong>create</strong> <code>1500</code>')) {
              throw new Error('expected the large-plan comment to keep the summary counts');
            }

  plan-failure:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run action against a failing fixture
        id: failure
        continue-on-error: true
        uses: ./
        env:
          COMMENT_NOTE: |
            Automated end-to-end plan-failure test. This verifies the failed-plan path and failure-style comment behavior.
            Expected to persist on the pull request and be updated by later runs of this same test.
        with:
          working-directory: fixtures/e2e/plan-failure
          terraform-version: '1.14.3'
          github-token: ${{ github.token }}

      - name: Assert failure outputs and action result
        shell: bash
        env:
          STEP_OUTCOME: ${{ steps.failure.outcome }}
          PLAN_EXIT_CODE: ${{ steps.failure.outputs.plan-exit-code }}
          HAS_CHANGES: ${{ steps.failure.outputs.has-changes }}
        run: |
          test "$STEP_OUTCOME" = "failure"
          test "$PLAN_EXIT_CODE" = "1"
          test "$HAS_CHANGES" = "false"

      - name: Assert the PR comment reflects a failed plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- terraform-plan-comment:fixtures-e2e-plan-failure:default -->';

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              }
            );

            const matches = comments.filter((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (matches.length !== 1) {
              throw new Error(`expected exactly one bot comment with marker ${marker}, found ${matches.length}`);
            }

            const body = matches[0].body;
            if (!body.includes('### Terraform Plan')) {
              throw new Error('expected the failure comment to include the Terraform Plan heading');
            }

            if (!body.includes('❌ Plan failed')) {
              throw new Error('expected the failure comment to include the failed-plan summary');
            }

            if (!body.includes('Automated end-to-end plan-failure test. This verifies the failed-plan path and failure-style comment behavior.')) {
              throw new Error('expected the failure comment to identify itself as an automated test artifact');
            }

            if (body.includes('✅ No changes')) {
              throw new Error('did not expect the failure comment to look like a no-changes success');
            }
