name: 'Terraform Plan Commenter'
description: 'Run terraform plan and post a formatted comment to the PR with summary badges'
author: 'thekbb'

branding:
  icon: 'git-pull-request'
  color: 'purple'

inputs:
  working-directory:
    description: 'Directory containing Terraform configuration'
    required: false
    default: '.'
  terraform-version:
    description: 'Terraform version to use'
    required: false
    default: 'latest'
  github-token:
    description: 'GitHub token for posting PR comments'
    required: false
    default: ${{ github.token }}
  setup-terraform:
    description: 'Whether to setup Terraform (set to false if already configured)'
    required: false
    default: 'true'
  init-args:
    description: 'Trusted-only additional arguments for terraform init'
    required: false
    default: ''
  plan-args:
    description: 'Trusted-only additional arguments for terraform plan'
    required: false
    default: ''
  summary-theme:
    description: 'Emoji theme for summary: default, colorblind, or minimal'
    required: false
    default: 'default'

outputs:
  plan-exit-code:
    description: 'Exit code from terraform plan (0=no changes, 1=error, 2=changes)'
    value: ${{ steps.plan.outputs.exitcode }}
  has-changes:
    description: 'Whether the plan has changes (true/false)'
    value: ${{ steps.plan.outputs.exitcode == '2' }}

runs:
  using: 'composite'
  steps:
    - name: Setup Terraform
      if: inputs.setup-terraform == 'true'
      uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false  # We capture output ourselves

    - name: Terraform Init
      id: init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TF_CLI_ARGS_init: ${{ inputs.init-args }}
      run: terraform init -input=false

    - name: Terraform Plan
      id: plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      continue-on-error: true
      env:
        TF_CLI_ARGS_plan: ${{ inputs.plan-args }}
      run: |
        set +e
        set -o pipefail
        plan_output_file="$(mktemp "${RUNNER_TEMP:-/tmp}/terraform-plan-comment.XXXXXX")"

        # Capture workspace
        workspace=$(terraform workspace show)
        echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
        echo "stdout_path=$plan_output_file" >> "$GITHUB_OUTPUT"

        # Run plan
        terraform plan -no-color -input=false -detailed-exitcode 2>&1 | tee "$plan_output_file"
        exitcode=${PIPESTATUS[0]}
        echo "exitcode=$exitcode" >> "$GITHUB_OUTPUT"

    - name: Post PR Comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        PLAN_FILE: ${{ steps.plan.outputs.stdout_path }}
        PLAN_EXIT_CODE: ${{ steps.plan.outputs.exitcode }}
        WORKING_DIR: ${{ inputs.working-directory }}
        TF_WORKSPACE: ${{ steps.plan.outputs.workspace }}
        SUMMARY_THEME: ${{ inputs.summary-theme }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const path = require('path');
          const scriptPath = path.join('${{ github.action_path }}', 'scripts', 'format-comment.cjs');
          const script = require(scriptPath);
          await script({ github, context, core });

    - name: Check Plan Status
      if: steps.plan.outputs.exitcode == '1'
      shell: bash
      run: |
        echo "::error::Terraform plan failed"
        exit 1

    - name: Clean up temporary plan file
      if: always() && steps.plan.outputs.stdout_path != ''
      shell: bash
      env:
        PLAN_FILE: ${{ steps.plan.outputs.stdout_path }}
      run: rm -f "$PLAN_FILE"
